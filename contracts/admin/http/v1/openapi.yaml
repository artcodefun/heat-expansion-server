openapi: 3.0.3
info:
  title: Heat Expansion Admin API
  version: 0.2.0
  description: |
    Administration service for Heat Expansion. Covers admin identity and session
    management, game prototype CRUD, content translation management, and billing
    crystal package CRUD.
servers:
  - url: .
tags:
  - name: Auth
    description: Admin identity and session management.
  - name: Prototypes
    description: Game prototype catalog management (army, build, storage, tech).
  - name: Translations
    description: Game content translation management.
  - name: Packages
    description: Billing crystal package catalog management.
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Complete invite-based registration and start a session
      description: |
        Completes first-time setup for a seeded admin using a one-time invite token,
        sets the password, and immediately issues a session token.
      operationId: registerAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, invite_token, password]
              properties:
                username:
                  type: string
                invite_token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Registration succeeded; session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate an admin and start a session
      operationId: loginAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login succeeded; session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session
      operationId: logoutAdmin
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session revoked
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current admin profile
      operationId: getCurrentAdmin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current admin profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  # ── Army prototypes ──────────────────────────────────────────────────────────
  /game/prototypes/army:
    get:
      tags: [Prototypes]
      summary: List all army prototypes
      operationId: listArmyPrototypes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of army prototypes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArmyPrototype'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Prototypes]
      summary: Create an army prototype
      operationId: createArmyPrototype
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArmyPrototype'
      responses:
        '201':
          description: Created army prototype
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArmyPrototype'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
  /game/prototypes/army/{id}:
    get:
      tags: [Prototypes]
      summary: Get an army prototype by id
      operationId: getArmyPrototype
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PrototypeID'
      responses:
        '200':
          description: Army prototype
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArmyPrototype'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Prototypes]
      summary: Update an army prototype
      operationId: updateArmyPrototype
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PrototypeID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArmyPrototype'
      responses:
        '200':
          description: Updated army prototype
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArmyPrototype'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'

