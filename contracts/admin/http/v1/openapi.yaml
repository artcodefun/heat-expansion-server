  # ── Translations ─────────────────────────────────────────────────────────────
  /game/translations:
    get:
      tags: [Translations]
      summary: List all translations
      operationId: listTranslations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of translation entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Translation'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Translations]
      summary: Upsert a translation entry
      description: Inserts or overwrites a single localised string. Triggers a hot-reload on all game nodes via LISTEN/NOTIFY.
      operationId: upsertTranslation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Translation'
      responses:
