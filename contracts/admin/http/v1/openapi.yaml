            schema:
              $ref: '#/components/schemas/CreateCrystalPackageRequest'
      responses:
        '200':
          description: Updated crystal package
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrystalPackage'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque session token returned by /auth/login or /auth/register.
  parameters:
    PrototypeID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PackageID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ErrorResponse:
      description: Request failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    SessionResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
    ProfileResponse:
      type: object
      required: [id, username, active, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        active:
          type: boolean
        created_at:
          type: integer
          format: int64
          description: Creation time as unix seconds.
    PriceModel:
      type: object
      properties:
        credits:
          type: integer
          format: int64
        iron:
          type: integer
          format: int64
        titanium:
          type: integer
          format: int64
        antimatter:
          type: integer
          format: int64
    ArmyPrototype:
      type: object
      required: [id, name, category, faction]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        category:
          type: string
        creation_sources:
          type: array
          items:
            type: string
        faction:
          type: string
        unlock_technology_id:
          type: integer
          format: int64
          nullable: true
        short_description:
          type: string
        full_description:
          type: string
        price:
          $ref: '#/components/schemas/PriceModel'
        production_time:
          type: integer
          format: int64
        space:
          type: integer
          format: int32
        image_url:
          type: string
        attack:
          type: integer
          format: int32
        defence:
          type: integer
          format: int32
        capacity:
          type: integer
          format: int32
        stealth:
          type: integer
          format: int32
        speed:
          type: integer
          format: int32
    BuildPrototype:
      type: object
      required: [id, name, category, faction]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        category:
          type: string
        creation_sources:
          type: array
          items:
            type: string
        faction:
          type: string
        unlock_technology_id:
          type: integer
          format: int64
          nullable: true
        short_description:
          type: string
        full_description:
          type: string
        price:
          $ref: '#/components/schemas/PriceModel'
        production_time:
          type: integer
          format: int64
        space:
          type: integer
          format: int32
        image_url:
          type: string
        control_data:
          type: object
          nullable: true
          properties:
            subtype:
              type: string
        resources_data:
          type: object
          nullable: true
          properties:
            credits_production:
              type: number
            iron_production:
              type: number
            titanium_production:
              type: number
            antimatter_production:
              type: number
            credits_capacity:
              type: integer
            iron_capacity:
              type: integer
            titanium_capacity:
              type: integer
            antimatter_capacity:
              type: integer
        defense_data:
          type: object
          nullable: true
          properties:
            defence_bonus:
              type: integer
        military_data:
          type: object
          nullable: true
          properties:
            unlock_army_category:
              type: string
        intelligence_data:
          type: object
          nullable: true
          properties:
            subtype:
              type: string
            stealth_strength:
              type: integer
            scan_range:
              type: integer
            scan_cooldown:
              type: integer
              format: int64
    StoragePrototype:
      type: object
      required: [id, name, category]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        category:
          type: string
        creation_sources:
          type: array
          items:
            type: string
        estimated_worth:
          type: integer
          format: int32
        short_description:
          type: string
        full_description:
          type: string
        image_url:
          type: string
        buff_data:
          type: object
          nullable: true
          properties:
            type:
              type: string
            value:
              type: number
            duration_seconds:
              type: integer
              format: int64
        intel_data:
          type: object
          nullable: true
          properties:
            type:
              type: string
            decryption_seconds:
              type: integer
              format: int64
        damaged_data:
          type: object
          nullable: true
          properties:
            restore_price:
              $ref: '#/components/schemas/PriceModel'
            restoration_seconds:
              type: integer
              format: int64
            original_unit_id:
              type: integer
              format: int64
        artifact_data:
          type: object
          nullable: true
          properties:
            type:
              type: string
            value:
              type: number
        consumable_data:
          type: object
          nullable: true
          properties:
            type:
              type: string
            box_contents:
              type: array
              items:
                type: string
            box_size:
              type: integer
    TechPrototype:
      type: object
      required: [id, name, category]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        category:
          type: string
        unlock_technology_id:
          type: integer
          format: int64
          description: 0 means no prerequisite.
        short_description:
          type: string
        full_description:
          type: string
        price:
          $ref: '#/components/schemas/PriceModel'
        research_time:
          type: integer
          format: int64
        image_url:
          type: string
        improvement:
          type: object
          nullable: true
          properties:
            type:
              type: string
            value:
              type: integer
            max_level:
              type: integer
              description: 0 = no cap.
    Translation:
      type: object
      required: [key, locale]
      properties:
        key:
          type: string
        locale:
          type: string
          enum: [en, ru]
        value:
          type: string
    CrystalPackage:
      type: object
      required: [id, name, crystals, price_minor_units, currency]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        crystals:
          type: integer
          format: int32
        price_minor_units:
          type: integer
          format: int64
        currency:
          type: string
        image_url:
          type: string
        is_active:
          type: boolean
    CreateCrystalPackageRequest:
      type: object
      required: [name, currency]
      properties:
        name:
          type: string
        crystals:
          type: integer
          format: int32
        price_minor_units:
          type: integer
          format: int64
        currency:
          type: string
        image_url:
          type: string
        is_active:
          type: boolean
