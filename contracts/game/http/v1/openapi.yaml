        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/buildings/pending:
    get:
      tags: [Buildings]
      summary: List pending buildings for a category
      operationId: listPendingBuildings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
        - $ref: '#/components/parameters/BuildCategoryQuery'
      responses:
        '200':
          description: Pending buildings returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BuildItemPendingDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/buildings/in-production:
    get:
      tags: [Buildings]
      summary: List buildings in production for a category
      operationId: listBuildingsInProduction
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
        - $ref: '#/components/parameters/BuildCategoryQuery'
      responses:
        '200':
          description: Buildings in production returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BuildItemInProductionDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/buildings/present:
    get:
      tags: [Buildings]
      summary: List present buildings for a category
      operationId: listPresentBuildings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
        - $ref: '#/components/parameters/BuildCategoryQuery'
      responses:
        '200':
          description: Present buildings returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BuildItemPresentDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/buildings/queue:
    post:
      tags: [Buildings]
      summary: Queue a building for production
      operationId: queueBuilding
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prototype_id]
              properties:
                prototype_id:
                  type: integer
                  minimum: 1
      responses:
        '202':
          description: Building queued
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/buildings/production/{itemId}/speed-up:
    post:
      tags: [Buildings]
      summary: Spend crystals to speed up building production
      operationId: speedUpBuildingProduction
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
        - $ref: '#/components/parameters/ItemIdUuid'
      responses:
        '200':
          description: Building production sped up
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/buildings/pending/{itemId}/cancel:
    post:
      tags: [Buildings]
      summary: Cancel a pending building
      operationId: cancelPendingBuilding
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
        - $ref: '#/components/parameters/ItemIdUuid'
      responses:
        '200':
