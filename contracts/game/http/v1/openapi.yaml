          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /diplomacy/messages/chats/{userId}/read:
    post:
      tags: [Diplomacy]
      summary: Mark a diplomatic chat as read
      operationId: markDiplomaticChatAsRead
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdUuid'
      responses:
        '200':
          description: Chat marked as read
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /diplomacy/messages:
    post:
      tags: [Diplomacy]
      summary: Send an informational diplomatic message
      operationId: sendDiplomaticMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [senderBaseId, receiverUserId, content]
              properties:
                senderBaseId:
                  type: integer
                  minimum: 1
                receiverUserId:
                  type: string
                  format: uuid
                receiverBaseId:
                  type: integer
                content:
                  type: string
                  enum:
                    - diplomacy.message.greeting_friendly_hello.content
                    - diplomacy.message.greeting_formal_introduction.content
                    - diplomacy.message.greeting_sign_of_admiration.content
                    - diplomacy.message.warning_keep_out_of_our_sector.content
                    - diplomacy.message.warning_do_not_interfere.content
                    - diplomacy.message.warning_general_threat.content
      responses:
        '201':
          description: Informational message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedUUIDResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /diplomacy/requests/pending:
    get:
      tags: [Diplomacy]
      summary: List pending diplomatic requests
      operationId: listPendingDiplomaticRequests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending requests returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DiplomaticRequestDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /diplomacy/requests:
    post:
      tags: [Diplomacy]
      summary: Send a diplomatic request
      operationId: sendDiplomaticRequest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [senderBaseId, receiverUserId, kind]
              properties:
                senderBaseId:
                  type: integer
                  minimum: 1
                receiverUserId:
                  type: string
                  format: uuid
                receiverBaseId:
                  type: integer
                kind:
                  type: string
                  enum: [COALITION_PROPOSAL, CEASEFIRE_PROPOSAL]
      responses:
        '201':
          description: Diplomatic request sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedUUIDResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /diplomacy/requests/{requestId}/accept:
    post:
      tags: [Diplomacy]
      summary: Accept a diplomatic request
      operationId: acceptDiplomaticRequest
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestIdUuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiplomaticRequestActionRequest'
      responses:
        '200':
          description: Diplomatic request accepted
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /diplomacy/requests/{requestId}/reject:
    post:
      tags: [Diplomacy]
      summary: Reject a diplomatic request
      operationId: rejectDiplomaticRequest
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestIdUuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiplomaticRequestActionRequest'
      responses:
        '200':
          description: Diplomatic request rejected
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    BaseId:
      name: baseId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OfferId:
      name: offerId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ItemIdUuid:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OperationLookupId:
      name: operationId
      in: path
      required: true
      schema:
        oneOf:
          - type: integer
            minimum: 1
          - type: string
            format: uuid
    UserIdUuid:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RequestIdUuid:
      name: requestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BuildCategoryQuery:
      name: category
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/BuildCategory'
    ArmyCategoryQuery:
      name: category
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/ArmyCategory'
    TechCategoryQuery:
      name: category
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/TechCategory'
    StorageCategoryQuery:
      name: category
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/StorageCategory'
    BlackMarketOfferKindQuery:
      name: kind
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/BlackMarketOfferKind'
    BlackMarketOfferLimitedQuery:
      name: limited
      in: query
      required: false
      schema:
        type: boolean
  responses:
    BadRequestError:
      description: Request binding or validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Requested entity was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorResponse:
      description: Request failed with an application, domain, or internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    MinClientVersionResponse:
      type: object
      required: [version]
      properties:
        version:
          type: string
          example: 0.2.0
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    CountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
    CreatedIntIDResponse:
      type: object
      required: [id]
      properties:
        id:
          type: integer
    CreatedUUIDResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
    UserCrystalBalanceResponse:
      type: object
      required: [crystals]
      properties:
        crystals:
          type: integer
    BlackMarketResourceType:
      type: string
      enum: [CREDITS, IRON, TITANIUM, ANTIMATTER]
    BlackMarketResourceRateDTO:
      type: object
      required: [resource_type, crystals_cost, resource_amount]
      properties:
        resource_type:
          $ref: '#/components/schemas/BlackMarketResourceType'
        crystals_cost:
          type: integer
          minimum: 1
        resource_amount:
          type: integer
          minimum: 1
    BlackMarketResourcePurchaseRequest:
      type: object
      required: [resource_type, crystals]
      properties:
        resource_type:
          $ref: '#/components/schemas/BlackMarketResourceType'
        crystals:
          type: integer
          minimum: 1
    BlackMarketOfferKind:
      type: string
      enum: [BUILDING, ARMY, STORAGE]
    BlackMarketOfferDTO:
      type: object
      required: [id, kind, prototype_id, price_in_crystals, is_limited, priority]
      properties:
        id:
          type: integer
        kind:
          $ref: '#/components/schemas/BlackMarketOfferKind'
        prototype_id:
          type: integer
        price_in_crystals:
          type: integer
          minimum: 1
        ends_at:
          type: integer
        is_limited:
          type: boolean
        priority:
          type: integer
        building:
          $ref: '#/components/schemas/BuildItemPrototypeDTO'
        army:
          $ref: '#/components/schemas/ArmyItemPrototypeDTO'
        storage:
          $ref: '#/components/schemas/StorageItemPrototypeDTO'
    Vector2iDTO:
