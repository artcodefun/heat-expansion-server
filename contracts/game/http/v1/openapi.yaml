      operationId: queueArmy
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prototype_id, count]
              properties:
                prototype_id:
                  type: integer
                  minimum: 1
                count:
                  type: integer
                  minimum: 1
      responses:
