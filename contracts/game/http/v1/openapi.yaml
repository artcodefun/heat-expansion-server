openapi: 3.0.3
info:
  title: Heat Expansion Game API
  version: 0.2.0
  description: |
    Core gameplay service for Heat Expansion.
    This API exposes player-facing game capabilities such as base management, production, operations, storage, radar, diplomacy, trade, alerts, and activity history.
servers:
  - url: .
tags:
  - name: Public
  - name: User
  - name: Black Market
  - name: Bases
  - name: Buildings
  - name: Army
  - name: Tech
  - name: Storage
  - name: Sectors
  - name: Radar
  - name: Operations
  - name: Activities
  - name: Alerts
  - name: Trade
  - name: Diplomacy
paths:
  /min-client-version:
    get:
      tags: [Public]
      summary: Return minimum supported client version
      operationId: getMinClientVersion
      responses:
        '200':
          description: Minimum supported version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MinClientVersionResponse'
  /user/balance:
    get:
      tags: [User]
      summary: Get current user crystal balance
      operationId: getCrystalBalance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Balance returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCrystalBalanceResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/black-market/resources:
    get:
      tags: [Black Market]
      summary: List Black Market resource rates for a base
      operationId: listBlackMarketResourceRates
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
      responses:
        '200':
          description: Resource exchange rates returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlackMarketResourceRateDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/black-market/resources/purchase:
    post:
      tags: [Black Market]
      summary: Spend crystals to buy resources for a base
      operationId: purchaseBlackMarketResources
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlackMarketResourcePurchaseRequest'
      responses:
        '200':
          description: Resource purchase completed
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/black-market/offers:
    get:
      tags: [Black Market]
      summary: List active Black Market offers for a base
      operationId: listBlackMarketOffers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
        - $ref: '#/components/parameters/BlackMarketOfferKindQuery'
        - $ref: '#/components/parameters/BlackMarketOfferLimitedQuery'
      responses:
        '200':
          description: Active Black Market offers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlackMarketOfferDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/black-market/offers/{offerId}/purchase:
    post:
      tags: [Black Market]
      summary: Purchase a Black Market offer for a base
      operationId: purchaseBlackMarketOffer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
        - $ref: '#/components/parameters/OfferId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Offer purchase completed
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases:
    get:
      tags: [Bases]
      summary: List bases owned by the authenticated user
      operationId: listUserBases
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Base list returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBaseDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/status:
    get:
      tags: [Bases]
      summary: Get aggregated resource and combat state for a base
      operationId: getBaseStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
      responses:
        '200':
          description: Base status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResourcesDTO'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /bases/{baseId}/buildings/new:
    get:
      tags: [Buildings]
      summary: List available building prototypes for a category
      operationId: listNewBuildings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BaseId'
        - $ref: '#/components/parameters/BuildCategoryQuery'
      responses:
        '200':
          description: Available building prototypes returned
          content:
            application/json:
              schema:
                type: array
