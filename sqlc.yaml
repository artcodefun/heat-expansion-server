version: "2"
sql:
  - schema: "internal/infrastructure/db/migrations"
    queries: "internal/infrastructure/db/queries"
    engine: "postgresql"
    gen:
      go:
        package: "gen"
        out: "internal/infrastructure/db/gen"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
  - schema: "internal/infrastructure/db/migrations"
    queries: "internal/infrastructure/readstore/queries"
    engine: "postgresql"
    gen:
      go:
        package: "gen"
        out: "internal/infrastructure/readstore/gen"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true