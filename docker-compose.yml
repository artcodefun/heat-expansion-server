version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: heatuser
      POSTGRES_PASSWORD: heatpassword
      POSTGRES_DB: heatdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8081:8081"
    env_file:
      - .env
    environment:
      # These overrides take precedence over .env for the container environment
      - GAME_PORT=8080
      - GAME_DB_URL=postgres://heatuser:heatpassword@db:5432/heatdb?sslmode=disable
      - GAME_ASSETS_DIR=/app/assets
      - GAME_MIGRATIONS_TABLE=game_schema_migrations
      - AUTH_PORT=8081
      - AUTH_DB_URL=postgres://heatuser:heatpassword@db:5432/heatdb?sslmode=disable
      - AUTH_JWT_SECRET=some-very-secret-key
      - AUTH_MIGRATIONS_TABLE=auth_schema_migrations
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - AUTH_INTEGRATION_EXCHANGE=auth.integration
    volumes:
      - ./assets:/app/assets

volumes:
  postgres_data:
