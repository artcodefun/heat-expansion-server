version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: heatuser
      POSTGRES_PASSWORD: heatpassword
      POSTGRES_DB: heatdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      # These overrides take precedence over .env for the container environment
      - PORT=8080
      - DB_URL=postgres://heatuser:heatpassword@db:5432/heatdb?sslmode=disable
      - ASSETS_DIR=/app/assets
    volumes:
      - ./assets:/app/assets

volumes:
  postgres_data:
