version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: heatuser
      POSTGRES_PASSWORD: heatpassword
      POSTGRES_DB: heatdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    restart: always
    pid: host
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:13133:13133"
    env_file:
      - .env

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8081:8081"
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:8083:8083"
    env_file:
      - .env
    environment:
      # These overrides take precedence over .env for the container environment
      - GAME_PORT=8080
      - GAME_DB_URL=postgres://heatuser:heatpassword@db:5432/heatdb?sslmode=disable
      - GAME_MIGRATIONS_TABLE=game_schema_migrations
      - GAME_GRPC_PORT=9080
      - GAME_GRPC_KEY=change-me-game-grpc-key
      - AUTH_PORT=8081
      - AUTH_DB_URL=postgres://heatuser:heatpassword@db:5432/heatdb?sslmode=disable
      - AUTH_MIGRATIONS_TABLE=auth_schema_migrations
      - AUTH_INTEGRATION_EXCHANGE=auth.integration
      - BILLING_PORT=8082
      - BILLING_DB_URL=postgres://heatuser:heatpassword@db:5432/heatdb?sslmode=disable
      - BILLING_MIGRATIONS_TABLE=billing_schema_migrations
      - BILLING_INTEGRATION_EXCHANGE=billing.integration
      - ADMIN_PORT=8083
      - ADMIN_DB_URL=postgres://heatuser:heatpassword@db:5432/heatdb?sslmode=disable
      - ADMIN_MIGRATIONS_TABLE=admin_schema_migrations
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=heat-expansion
volumes:
  postgres_data:
