          game_black_market_offer: BlackMarketOffer
          game_build_item_prototype: BuildItemPrototype
          game_dangerous_location: DangerousLocation
          game_domain_event: DomainEvent
          game_diplomatic_message: DiplomaticMessage
          game_diplomatic_relationship: DiplomaticRelationship
          game_diplomatic_request: DiplomaticRequest
          game_military_operation: MilitaryOperation
          game_radar_threat: RadarThreat
          game_resource_location: ResourceLocation
          game_scan_report: ScanReport
          game_scheduled_job: ScheduledJob
          game_sector: Sector
