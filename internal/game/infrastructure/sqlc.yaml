        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        rename:
          game_activity: Activity
          game_alert: Alert
          game_army_item_prototype: ArmyItemPrototype
          game_base_army_item: BaseArmyItem
